<!doctype html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bitki Tanı — PhyraMed</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Cpath fill='%2329442E' d='M12 2C8 7 5 10.5 5 14.5A7 7 0 0 0 19 14.5C19 10.5 16 7 12 2z'/%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
  <script src="../js/data.js" defer></script>
  <script src="../js/main.js" defer></script>
</head>
<body data-home="../index.html" data-profil="profil.html" data-tani="gorsel-tanima.html">

  <header class="navbar"></header>

  <main class="recognize-page">
    <a href="../index.html" class="back-link">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      Kategorilere dön
    </a>

    <h1>Bitki Tanı</h1>
    <p>Bir bitkinin fotoğrafını yükle veya çek, ne işe yaradığını öğren.</p>

    <div class="disclaimer">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 9v4M12 17h.01M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z"/></svg>
      <span><strong>Bilgilendirme amaçlıdır, tıbbi tavsiye değildir.</strong> Görsel tanıma sonucu bir öneridir; kesin teşhis için bir uzmana danışın.</span>
    </div>

    <label class="dropzone" id="dropzone" for="photo-input">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M12 16V4M12 4l-4 4M12 4l4 4"/><path d="M4 16v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2"/></svg>
      <div><strong>Fotoğraf yükle</strong> ya da bu alana sürükle</div>
      <p class="hint">Mobilde dokununca doğrudan kamera açılır</p>
      <input type="file" id="photo-input" accept="image/*" capture="environment" />
    </label>

    <div class="preview-wrap" id="preview-wrap" style="display:none;">
      <img id="preview-img" alt="Yüklenen bitki fotoğrafı önizlemesi" />
      <div class="preview-actions">
        <button type="button" class="btn-primary" id="analyze-btn">Analiz Et</button>
        <button type="button" class="btn-ghost" id="reset-btn">Başka fotoğraf seç</button>
      </div>
      <div class="analyzing" id="analyzing" style="display:none;">
        <span class="spinner" aria-hidden="true"></span> Fotoğraf analiz ediliyor...
      </div>
    </div>

    <div id="result-wrap"></div>
  </main>

  <footer class="site-footer"></footer>

  <div class="chatbot-wrap"></div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const dropzone = document.getElementById("dropzone");
      const input = document.getElementById("photo-input");
      const previewWrap = document.getElementById("preview-wrap");
      const previewImg = document.getElementById("preview-img");
      const analyzeBtn = document.getElementById("analyze-btn");
      const resetBtn = document.getElementById("reset-btn");
      const analyzing = document.getElementById("analyzing");
      const resultWrap = document.getElementById("result-wrap");

      // Sürükle-bırak desteği
      ["dragover", "dragenter"].forEach((evt) =>
        dropzone.addEventListener(evt, (e) => { e.preventDefault(); dropzone.classList.add("dragover"); })
      );
      ["dragleave", "drop"].forEach((evt) =>
        dropzone.addEventListener(evt, (e) => { e.preventDefault(); dropzone.classList.remove("dragover"); })
      );
      dropzone.addEventListener("drop", (e) => {
        const file = e.dataTransfer.files?.[0];
        if (file) handleFile(file);
      });

      input.addEventListener("change", () => {
        const file = input.files?.[0];
        if (file) handleFile(file);
      });

      const MAX_FILE_SIZE = 8 * 1024 * 1024; // 8MB — telefon fotoğrafları için yeterli, aşırı büyük dosyaları eler

      function handleFile(file) {
        clearError();

        if (!file.type.startsWith("image/")) {
          showError("Sadece fotoğraf dosyaları (JPEG, PNG, WEBP vb.) yüklenebilir.");
          return;
        }
        if (file.size > MAX_FILE_SIZE) {
          const mb = (file.size / (1024 * 1024)).toFixed(1);
          showError(`Dosya çok büyük (${mb} MB). En fazla 8 MB boyutunda bir fotoğraf yükleyebilirsin.`);
          return;
        }

        const reader = new FileReader();
        reader.onload = () => {
          previewImg.src = reader.result;
          previewWrap.style.display = "block";
          resultWrap.innerHTML = "";
          dropzone.style.display = "none";
        };
        reader.readAsDataURL(file);
      }

      function showError(message) {
        let errorEl = document.getElementById("upload-error");
        if (!errorEl) {
          errorEl = document.createElement("p");
          errorEl.id = "upload-error";
          errorEl.style.cssText = "color:var(--evidence-weak);font-size:0.85rem;margin-top:0.75rem;";
          dropzone.insertAdjacentElement("afterend", errorEl);
        }
        errorEl.textContent = message;
      }

      function clearError() {
        document.getElementById("upload-error")?.remove();
      }

      analyzeBtn.addEventListener("click", () => {
        analyzing.style.display = "flex";
        analyzeBtn.disabled = true;
        resultWrap.innerHTML = "";

        // NOT: Şu an sabit bir örnek sonuç gösteriyoruz. AI/Melike'nin görsel
        // tanıma modeli hazır olunca burası gerçek bir API çağrısına
        // (ör. POST /api/recognize, dönen alanlar RECOGNITION_DEMO ile aynı
        // şekilde) bağlanacak, geri kalan render kodu değişmeyecek.
        setTimeout(() => {
          analyzing.style.display = "none";
          analyzeBtn.disabled = false;
          renderResult(PhyraMed.RECOGNITION_DEMO);
        }, 1400);
      });

      resetBtn.addEventListener("click", () => {
        input.value = "";
        previewWrap.style.display = "none";
        dropzone.style.display = "block";
        resultWrap.innerHTML = "";
        clearError();
      });

      function renderResult(result) {
        const esc = PhyraMed.escapeHTML;
        resultWrap.innerHTML = `
          <div class="result-card">
            <div class="card-top" style="margin-bottom:0.5rem;">
              <h3 style="margin:0;color:var(--forest-900);">${esc(result.name)}</h3>
              <span class="confidence">%${esc(result.confidence)} eşleşme</span>
            </div>
            <p style="font-size:0.9rem;color:var(--muted);margin:0 0 1rem;">${esc(result.summary)}</p>
            <a href="urun.html?id=${encodeURIComponent(result.related_product_id)}" class="btn-primary" style="display:inline-flex;text-decoration:none;">İlgili ürünü gör</a>
          </div>
        `;
      }
    });
  </script>
</body>
</html>
